<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重返未來：1999 靈感溯源測試</title>
    <style>
        :root {
            --bg-color: #111111;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-color: #d4af37; /* 復古金 */
            --accent-hover: #b8962e;
            --border-color: #333333;
        }

        body {
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            line-height: 1.6;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 650px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            pointer-events: none;
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .author {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 1px;
            font-family: monospace;
            opacity: 0.7;
        }

        /* --- 封面頁專屬樣式 --- */
        .cover-content {
            text-align: center;
            padding: 30px 20px 20px 20px;
            animation: fadeIn 1.5s ease-in;
        }

        .cover-quote {
            font-size: 1.25rem;
            color: #dddddd;
            line-height: 2;
            margin-bottom: 30px;
            letter-spacing: 1.5px;
        }

        .cover-instruction {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 40px;
            opacity: 0.9;
        }

        button.btn-start {
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button.btn-start:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        /* --- 測驗區樣式 --- */
        .question-header {
            font-weight: bold;
            font-size: 1.25rem;
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        .context {
            font-size: 1.05rem;
            margin-bottom: 25px;
            color: #cccccc;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-left: 3px solid var(--accent-color);
            border-radius: 0 5px 5px 0;
        }

        .instruction {
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-style: italic;
            opacity: 0.8;
        }

        .option {
            background-color: #252525;
            border: 1px solid var(--border-color);
            padding: 16px 16px 16px 55px;
            margin-bottom: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            font-size: 1rem;
        }

        .option:hover {
            border-color: var(--accent-color);
            background-color: #2a2a2a;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: var(--accent-color);
            background-color: #1a1a1a;
            opacity: 0.6;
            pointer-events: none;
            transform: translateX(0);
        }

        .rank-badge {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .option.selected .rank-badge {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        button.btn-back {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        button.btn-back:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        button.btn-reset {
            color: var(--bg-color);
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            margin-top: 40px;
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button.btn-reset:hover {
            background-color: var(--accent-hover);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .hidden {
            display: none !important;
        }

        /* --- 結算區樣式 --- */
        .result-content {
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .result-title {
            font-size: 3.5rem;
            color: var(--accent-color);
            margin: 10px 0 25px 0;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        
        .desc-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 25px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 20px;
        }

        .r-desc-main {
            font-size: 1.15rem;
            color: #ffffff;
            margin-bottom: 20px;
        }

        .r-desc-social {
            font-size: 1.05rem;
            color: #cccccc;
            border-top: 1px dashed var(--border-color);
            padding-top: 20px;
        }

        .social-tag {
            color: var(--accent-color);
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>1999 靈感溯源測試</h1>
    <div class="author">By Tungtung</div>
    
    <div id="cover-section" class="cover-content">
        <div class="cover-quote">
            「暴雨」將至，<br>
            唯有看清內心的指引，<br>
            方能找回丟失的時間。
        </div>
        <div class="cover-instruction">
            ※ 請依據直覺對各項行為排定優先級
        </div>
        <button class="btn-start" onclick="startQuiz()">開始溯源</button>
    </div>

    <div id="quiz-section" class="hidden">
        <div class="question-header" id="q-title">加載中...</div>
        <div class="context" id="q-context"></div>
        <div class="instruction">▶ 請依序點擊選項，排定你的決策優先級（1=最優先，3=最後考慮）</div>
        
        <div id="options-container"></div>

        <div class="controls">
            <button id="btn-back" class="btn-back hidden">← 返回上一題</button>
            <div id="progress-text" style="color: var(--text-muted); font-family: monospace; font-size: 1.1rem;">1 / 6</div>
        </div>
    </div>

    <div id="result-section" class="hidden result-content">
        <div class="result-subtitle">你的靈感頻率映射為</div>
        <div class="result-title" id="r-title">加載中</div>
        
        <div class="desc-box">
            <div id="r-desc-main" class="r-desc-main"></div>
            <div id="r-desc-social" class="r-desc-social hidden"></div>
        </div>
        
        <button class="btn-reset" onclick="initQuiz()">重新進行檢測</button>
    </div>
</div>

<script>
    const questions = [
        {
            title: "Q1. 純雨滴的誘惑",
            context: "在執行外勤任務時，你獨自在一處即將坍塌的遺跡中發現了一批極度稀有的「純雨滴」，但通訊設備已斷開。",
            options: [
                { text: "私自將純雨滴吸收，享受神秘學能量瞬間充盈全身的快感。", type: "id" },
                { text: "妥善打包規劃撤退，準備帶回黑市交易換取更實用的材料或裝備。", type: "ego" },
                { text: "原封不動地帶回聖帕夫洛夫基金會，交由上級進行戰略分配。", type: "superego" }
            ]
        },
        {
            title: "Q2. 重塑的煽動",
            context: "「重塑之手」在你所在的城市散播煽動性的神秘學言論，基金會面臨嚴峻的信任危機。作為司辰，你的第一步是：",
            options: [
                { text: "拒絕妥協，直接派人從物理層面「解決」掉散播消息的源頭。", type: "id" },
                { text: "發布一份經過精心修飾的聲明轉移大眾視線，以最低成本控制損害。", type: "ego" },
                { text: "遵循透明度原則公開完整調查報告，哪怕會讓基金會短暫失去威信。", type: "superego" }
            ]
        },
        {
            title: "Q3. 箱中的衝突",
            context: "在你的手提箱荒原裡，兩位性格迥異的神秘學家因為作息問題即將大打出手。",
            options: [
                { text: "冷臉旁觀，但也想看看到底誰的神秘術更強。", type: "id" },
                { text: "介入調停，提出一個雙方各退一步的折衷方案，維持箱內的運作效率。", type: "ego" },
                { text: "拿出箱內的《荒原管理條例》，嚴格按照明文規定對雙方進行裁決。", type: "superego" }
            ]
        },
        {
            title: "Q4. 晚宴上的試探",
            context: "你代表基金會出席一場人類名流晚宴，一位傲慢的貴族在交談中暗諷神秘學家只不過是好用的異類。",
            options: [
                { text: "暗中施展神秘術讓他當眾出糗，痛快地宣洩心中的不滿。", type: "id" },
                { text: "保持禮貌的微笑，並利用他的傲慢作為談判籌碼，反向為基金會爭取更多資金。", type: "ego" },
                { text: "嚴肅地引述基金會的平權條約，不卑不亢地當面糾正他的歧視性措辭。", type: "superego" }
            ]
        },
        {
            title: "Q5. 苦鹽的代價",
            context: "在對抗魔精的戰鬥中，你的隊友身受重傷，而最終Boss正在醞釀致命的儀式。",
            options: [
                { text: "放棄所有防守，憑藉直覺釋放攻擊倍率最高的神秘術。", type: "id" },
                { text: "快速計算勝率，如果能保證最終勝利，不惜將重傷的隊友視為誘餌。", type: "ego" },
                { text: "死守戰術手冊的底線，寧可放棄任務也必須優先掩護隊友撤離。", type: "superego" }
            ]
        },
        {
            title: "Q6. 暴雨的盡頭",
            context: "如果你獲得了終止「暴雨」的權力，但代價是必須從歷史中徹底抹除「神秘學家」這個群體。",
            options: [
                { text: "拒絕。失去神秘學的純人類世界太過無趣，你寧願接受現在的混亂與瘋狂。", type: "id" },
                { text: "評估時間線。仔細計算哪一種未來能讓你和你的核心團隊獲得最大的利益。", type: "ego" },
                { text: "同意。為了恢復人類歷史原本「正確」的進程，少數群體的犧牲是必要的。", type: "superego" }
            ]
        }
    ];

    let currentStep = 0;
    let scores = { id: 0, ego: 0, superego: 0 };
    let currentQuestionRanks = []; 
    let history = []; 

    const coverSection = document.getElementById('cover-section');
    const quizSection = document.getElementById('quiz-section');
    const resultSection = document.getElementById('result-section');
    const optionsContainer = document.getElementById('options-container');
    const btnBack = document.getElementById('btn-back');

    function initQuiz() {
        currentStep = 0;
        scores = { id: 0, ego: 0, superego: 0 };
        history = [];
        
        coverSection.classList.remove('hidden');
        quizSection.classList.add('hidden');
        resultSection.classList.add('hidden');
    }

    function startQuiz() {
        coverSection.classList.add('hidden');
        quizSection.classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentStep];
        document.getElementById('q-title').innerText = q.title;
        document.getElementById('q-context').innerText = q.context;
        document.getElementById('progress-text').innerText = `${currentStep + 1} / ${questions.length}`;
        
        btnBack.classList.toggle('hidden', currentStep === 0);

        currentQuestionRanks = [];
        optionsContainer.innerHTML = '';

        const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach((opt) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="rank-badge"></div>${opt.text}`;
            div.onclick = () => handleOptionSelect(div, opt.type);
            optionsContainer.appendChild(div);
        });
    }

    function handleOptionSelect(element, type) {
        if (element.classList.contains('selected')) return;

        const rank = currentQuestionRanks.length + 1; 
        const points = 4 - rank; 

        element.classList.add('selected');
        element.querySelector('.rank-badge').innerText = rank;

        currentQuestionRanks.push({ type, points });

        if (currentQuestionRanks.length === 3) {
            setTimeout(() => {
                saveHistoryAndAdvance();
            }, 600); 
        }
    }

    function saveHistoryAndAdvance() {
        history.push([...currentQuestionRanks]);

        currentQuestionRanks.forEach(item => {
            scores[item.type] += item.points;
        });

        currentStep++;

        if (currentStep < questions.length) {
            renderQuestion();
        } else {
            calculateResult();
        }
    }

    btnBack.onclick = () => {
        if (currentStep > 0 && history.length > 0) {
            currentStep--;
            const lastRanks = history.pop();
            lastRanks.forEach(item => {
                scores[item.type] -= item.points;
            });
            renderQuestion();
        }
    };

    function calculateResult() {
        quizSection.classList.add('hidden');
        resultSection.classList.remove('hidden');

        let { id, ego, superego } = scores;

        // 【方案一：Q6 決勝機制】(僅針對最高分平局 13-13-10 進行打破)
        const q6Choices = history[5]; 
        let maxScoreOrig = Math.max(id, ego, superego);
        let maxCount = 0;
        if (id === maxScoreOrig) maxCount++;
        if (ego === maxScoreOrig) maxCount++;
        if (superego === maxScoreOrig) maxCount++;

        if (maxCount >= 2 && !(id === 12 && ego === 12 && superego === 12)) {
            q6Choices.forEach(choice => {
                if (scores[choice.type] === maxScoreOrig) {
                    if(choice.type === 'id') id += (choice.points * 0.1);
                    if(choice.type === 'ego') ego += (choice.points * 0.1);
                    if(choice.type === 'superego') superego += (choice.points * 0.1);
                }
            });
        }

        let resultTitle = "";
        let resultDescMain = "";
        let resultDescSocial = "";
        let hasSocial = true;

        // 計算原始分數中最低分出現的次數
        // 因為 Q6 決勝機制只會加分給 maxScore，所以 minScore 絕對保持原樣
        let minScoreOrig = Math.min(scores.id, scores.ego, scores.superego);
        let minCount = 0;
        if (scores.id === minScoreOrig) minCount++;
        if (scores.ego === minScoreOrig) minCount++;
        if (scores.superego === minScoreOrig) minCount++;

        // 【SSR 彩蛋】 12-12-12 絕對平衡
        if (scores.id === 12 && scores.ego === 12 && scores.superego === 12) {
            resultTitle = "觀測者";
            resultDescMain = "你跳脫了現有靈感的框架，是見證時代暴雨的觀測者。";
            hasSocial = false;
        } 
        // 【SR / UR 彩蛋】 最低分平手 (如 14-11-11 偏躍 或 18-9-9 奇點)
        else if (minCount === 2) {
            if (maxScoreOrig === 18) {
                resultTitle = "奇點";
                resultDescMain = "演算法的極限，純粹的化身。某種單一的驅動力在你體內達到了絕對的閾值，燃盡了所有多餘的雜質，形成了一個極端純粹的奇點。";
            } else {
                resultTitle = "新靈感";
                resultDescMain = "你的潛意識原本如同一潭死水，但在暴雨的催化下，某種微小而堅定的特質發生了偏躍。你正處於蛻變的邊緣，是一顆尚未完全定型的原石。";
            }
            hasSocial = false;
        }
        // 【常規判定】 絕對單一排序
        else if (superego > ego && ego > id) {
            resultTitle = "智";
            resultDescMain = "你理性、守序而冷靜，具有深邃的戰略眼光。";
            resultDescSocial = "你與「靈」是硬幣的兩面，絕對理性與純粹直覺的對立。與其他自然靈感相處時，你則是無可挑剔的客觀旁觀者。";
        } else if (ego > superego && superego > id) {
            resultTitle = "星";
            resultDescMain = "你的適應力強，並善於觀察，能在規則與本能中取得平衡。";
            resultDescSocial = "你的跳脫能幫助打開「岩」的思維；當你隨性飄忽、幾乎要失去方向時，溫和包容的「木」是你最安心的避風港。";
        } else if (id > superego && superego > ego) {
            resultTitle = "岩";
            resultDescMain = "你堅定不移、直覺敏銳，是夥伴最可靠的後盾。";
            resultDescSocial = "你沉穩的氣場能安撫「獸」偶爾的焦躁；但「星」那不按常理出牌的靈動卻又令你忍不住想靠近。";
        } else if (id > ego && ego > superego) {
            resultTitle = "獸";
            resultDescMain = "你的個性率真熱烈，生命力旺盛，永不被束縛。";
            resultDescSocial = "你的直率能輕易點燃「木」的平靜世界；在堅定不移的「岩」面前，你會交出你最純粹的依賴與信任。";
        } else if (ego > id && id > superego) {
            resultTitle = "木";
            resultDescMain = "你適應力強，溫和包容，具備極強的共情力。";
            resultDescSocial = "你的溫和與穩定能完美包容「星」的變幻莫測；「獸」的熾熱與毫無保留往往對你有著強烈的吸引力。";
        } else if (superego > id && id > ego) {
            resultTitle = "靈";
            resultDescMain = "你超然而神秘，靈活跳脫世俗的邊界。";
            resultDescSocial = "你與「智」用完全相反的維度在解構這個世界。他們的絕對邏輯能冷靜地看穿你的超然，而你的敏銳直覺能輕易打破他們的公式。";
        }

        // 渲染結果畫面
        document.getElementById('r-title').innerText = resultTitle;
        document.getElementById('r-desc-main').innerText = resultDescMain;
        
        const socialDiv = document.getElementById('r-desc-social');
        if (hasSocial) {
            socialDiv.innerHTML = `<span class="social-tag">✦ 社交相性 ✦</span>${resultDescSocial}`;
            socialDiv.classList.remove('hidden');
        } else {
            socialDiv.classList.add('hidden');
        }
    }

    initQuiz();
</script>

</body>
</html>
